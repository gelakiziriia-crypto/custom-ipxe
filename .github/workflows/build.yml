name: Build Custom iPXE

on:
  workflow_dispatch:

jobs:
  # Блок build-bios полностью удален, так как файлы уже получены
  build-uefi:
    name: Compile UEFI (64-bit)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout custom configs
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        # Устанавливаем syslinux и syslinux-common для успешной сборки .usb образа
        sudo apt-get install -y build-essential liblzma-dev mtools xorriso syslinux syslinux-common git

    - name: Clone official iPXE
      run: git clone --depth 1 https://github.com

    - name: Compile UEFI Binaries
      run: |
        cd ipxe/src
        
        # Включаем HTTPS, iSCSI, графику и полный стек USB для UEFI
        sed -i 's/#undef\tDOWNLOAD_PROTO_HTTPS/#define DOWNLOAD_PROTO_HTTPS/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_ISCSI/#define SANBOOT_PROTO_ISCSI/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_HTTP/#define SANBOOT_PROTO_HTTP/' config/general.h
        sed -i 's/#undef\tCONSOLE_FRAMEBUFFER/#define CONSOLE_FRAMEBUFFER/' config/console.h
        sed -i 's/#undef\tUSB_HCD_XHCI/#define USB_HCD_XHCI/' config/usb.h
        sed -i 's/#undef\tUSB_KEYBOARD/#define USB_KEYBOARD/' config/usb.h
        sed -i 's/#undef\tUSB_BLOCK/#define USB_BLOCK/' config/usb.h
        sed -i 's/#undef\tUSB_EFI/#define USB_EFI/' config/usb.h
        cp ../../chain.ipxe chain.ipxe
        
        # Записываем бескомпромиссный набор команд отладки и форматов образов для UEFI
        cat <<EOF > config/local/general.h
        #define DOWNLOAD_PROTO_NFS
        #define IMAGE_PNG
        #define IMAGE_SCRIPT
        #define IMAGE_EFI
        #define CONSOLE_CMD
        #define CONFIG_CMD
        #define MENU_CMD
        #define SHELL_CMD
        #define PING_CMD
        #define PCI_CMD
        #define PARAM_CMD
        #define REBOOT_CMD
        #define POWEROFF_CMD
        EOF
        
        # Собираем чистый .efi файл
        make bin-x86_64-efi/ipxe.efi EMBED=chain.ipxe CONFIG=uefi
        
        # Собираем .usb файл, принудительно указав путь к mbr.bin в Ubuntu окружении
        make bin-x86_64-efi/ipxe.usb EMBED=chain.ipxe CONFIG=uefi SYSLINUX_MBR=/usr/lib/syslinux/mbr/mbr.bin

    - name: Upload UEFI Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ipxe-uefi-binaries
        path: |
          ipxe/src/bin-x86_64-efi/ipxe.efi
          ipxe/src/bin-x86_64-efi/ipxe.usb
