name: Build Custom iPXE

on:
  workflow_dispatch:

jobs:
  build-ipxe:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout custom configs
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential liblzma-dev mtools xorriso syslinux git

    - name: Clone official iPXE
      run: git clone --depth 1 https://github.com/ipxe/ipxe.git

    - name: Apply custom configuration
      run: |
        sed -i 's/#undef\tDOWNLOAD_PROTO_HTTPS/#define DOWNLOAD_PROTO_HTTPS/' ipxe/src/config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_ISCSI/#define SANBOOT_PROTO_ISCSI/' ipxe/src/config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_HTTP/#define SANBOOT_PROTO_HTTP/' ipxe/src/config/general.h
        sed -i 's/#undef\tCONSOLE_FRAMEBUFFER/#define CONSOLE_FRAMEBUFFER/' ipxe/src/config/console.h
        sed -i 's/#undef\tUSB_HCD_XHCI/#define USB_HCD_XHCI/' ipxe/src/config/usb.h
        sed -i 's/#undef\tUSB_KEYBOARD/#define USB_KEYBOARD/' ipxe/src/config/usb.h
        sed -i 's/#undef\tUSB_BLOCK/#define USB_BLOCK/' ipxe/src/config/usb.h
        sed -i 's/#undef\tUSB_EFI/#define USB_EFI/' ipxe/src/config/usb.h
        cat config.h >> ipxe/src/config/general.h
        cp chain.ipxe ipxe/src/chain.ipxe

    - name: Compile BIOS binary
      run: |
        cd ipxe/src
        make bin/undionly.kpxe EMBED=chain.ipxe

    - name: Compile UEFI binary
      run: |
        cd ipxe/src
        make bin-x86_64-efi/ipxe.efi EMBED=chain.ipxe

    - name: Compile USB Flash image
      run: |
        cd ipxe/src
        make bin-x86_64-efi/ipxe.usb EMBED=chain.ipxe

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ipxe-full-binaries
        path: |
          ipxe/src/bin/undionly.kpxe
          ipxe/src/bin-x86_64-efi/ipxe.efi
          ipxe/src/bin-x86_64-efi/ipxe.usb
