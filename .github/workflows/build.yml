name: Build Custom iPXE

on:
  workflow_dispatch:

jobs:
  build-ipxe:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout custom configs
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential liblzma-dev mtools xorriso syslinux git

    - name: Clone official iPXE
      run: git clone --depth 1 https://github.com/ipxe/ipxe.git

    - name: Compile Full BIOS binary
      run: |
        cd ipxe/src
        # Включаем HTTPS, iSCSI и графику для BIOS
        sed -i 's/#undef\tDOWNLOAD_PROTO_HTTPS/#define DOWNLOAD_PROTO_HTTPS/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_ISCSI/#define SANBOOT_PROTO_ISCSI/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_HTTP/#define SANBOOT_PROTO_HTTP/' config/general.h
        sed -i 's/#undef\tCONSOLE_FRAMEBUFFER/#define CONSOLE_FRAMEBUFFER/' config/console.h
        cp ../../chain.ipxe chain.ipxe
        
        # Дописываем тяжелые команды отладки и bzImage для BIOS
        cat <<EOF >> config.h
        #define DOWNLOAD_PROTO_NFS
        #define IMAGE_BZIMAGE
        #define IMAGE_COMBOOT
        #define IMAGE_PNG
        #define IMAGE_SCRIPT
        #define CONSOLE_CMD
        #define CONFIG_CMD
        #define MENU_CMD
        #define SHELL_CMD
        #define PING_CMD
        #define PCI_CMD
        #define PARAM_CMD
        #define REBOOT_CMD
        #define POWEROFF_CMD
        EOF
        cat config.h >> config/general.h
        make bin/undionly.kpxe EMBED=chain.ipxe

    - name: Compile Full UEFI binary
      run: |
        cd ipxe/src
        # Сбрасываем изменения, возвращаясь к чистому состоянию репозитория
        git checkout -- config/
        cp ../../chain.ipxe chain.ipxe
        
        # Включаем HTTPS, iSCSI, графику и ВСЕ модули USB для UEFI
        sed -i 's/#undef\tDOWNLOAD_PROTO_HTTPS/#define DOWNLOAD_PROTO_HTTPS/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_ISCSI/#define SANBOOT_PROTO_ISCSI/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_HTTP/#define SANBOOT_PROTO_HTTP/' config/general.h
        sed -i 's/#undef\tCONSOLE_FRAMEBUFFER/#define CONSOLE_FRAMEBUFFER/' config/console.h
        sed -i 's/#undef\tUSB_HCD_XHCI/#define USB_HCD_XHCI/' config/usb.h
        sed -i 's/#undef\tUSB_KEYBOARD/#define USB_KEYBOARD/' config/usb.h
        sed -i 's/#undef\tUSB_BLOCK/#define USB_BLOCK/' config/usb.h
        sed -i 's/#undef\tUSB_EFI/#define USB_EFI/' config/usb.h
        
        # Дописываем команды отладки для UEFI (убрана проблемная PCI_CMD)
        cat <<EOF >> config.h
        #define DOWNLOAD_PROTO_NFS
        #define IMAGE_PNG
        #define IMAGE_SCRIPT
        #define IMAGE_EFI
        #define CONSOLE_CMD
        #define CONFIG_CMD
        #define MENU_CMD
        #define SHELL_CMD
        #define PING_CMD
        #define PARAM_CMD
        #define REBOOT_CMD
        #define POWEROFF_CMD
        EOF
        cat config.h >> config/general.h
        
        # Компилируем UEFI
        make bin-x86_64-efi/snponly.efi EMBED=chain.ipxe
        make bin-x86_64-efi/ipxe.usb EMBED=chain.ipxe

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ipxe-full-binaries
        path: |
          ipxe/src/bin/undionly.kpxe
          ipxe/src/bin-x86_64-efi/snponly.efi
          ipxe/src/bin-x86_64-efi/ipxe.usb
