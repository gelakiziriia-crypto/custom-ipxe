name: Build Custom iPXE

on:
  workflow_dispatch:

jobs:
  build-bios:
    name: Compile BIOS (Legacy)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout custom configs
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential liblzma-dev mtools syslinux git

    - name: Clone official iPXE
      run: git clone --depth 1 https://github.com/ipxe/ipxe.git

    - name: Compile BIOS Binary
      run: |
        cd ipxe/src
        sed -i 's/#undef\tDOWNLOAD_PROTO_HTTPS/#define DOWNLOAD_PROTO_HTTPS/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_ISCSI/#define SANBOOT_PROTO_ISCSI/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_HTTP/#define SANBOOT_PROTO_HTTP/' config/general.h
        sed -i 's/#undef\tCONSOLE_FRAMEBUFFER/#define CONSOLE_FRAMEBUFFER/' config/console.h
        cp ../../chain.ipxe chain.ipxe
        
        cat <<EOF > config/local/general.h
        #define DOWNLOAD_PROTO_NFS
        #define IMAGE_BZIMAGE
        #define IMAGE_COMBOOT
        #define IMAGE_PNG
        #define IMAGE_SCRIPT
        #define CONSOLE_CMD
        #define CONFIG_CMD
        #define MENU_CMD
        #define SHELL_CMD
        #define PING_CMD
        #define PCI_CMD
        #define PARAM_CMD
        #define REBOOT_CMD
        #define POWEROFF_CMD
        EOF
        
        make bin/undionly.kpxe EMBED=chain.ipxe

    - name: Upload BIOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ipxe-bios-binary
        path: ipxe/src/bin/undionly.kpxe

  build-uefi:
    name: Compile UEFI (64-bit)
    runs-on: ubuntu-latest
    steps:
    - name: Checkout custom configs
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential liblzma-dev mtools xorriso git

    - name: Clone official iPXE
      run: git clone --depth 1 https://github.com

    - name: Compile UEFI Binaries
      run: |
        cd ipxe/src
        
        # ХАК: Отключаем BIOS-компонент сокрытия памяти, который ломает линковку 64-битного UEFI
        sed -i 's/BLIB_OBJS\s+=/\0\nBLIB_OBJS\t+=/' arch/x86/Makefile.pcbios
        sed -i '/hidemem.o/d' arch/x86/Makefile.pcbios
        
        # Включаем базовые протоколы, графику и весь стек USB 3.0 XHCI
        sed -i 's/#undef\tDOWNLOAD_PROTO_HTTPS/#define DOWNLOAD_PROTO_HTTPS/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_ISCSI/#define SANBOOT_PROTO_ISCSI/' config/general.h
        sed -i 's/#undef\tSANBOOT_PROTO_HTTP/#define SANBOOT_PROTO_HTTP/' config/general.h
        sed -i 's/#undef\tCONSOLE_FRAMEBUFFER/#define CONSOLE_FRAMEBUFFER/' config/console.h
        sed -i 's/#undef\tUSB_HCD_XHCI/#define USB_HCD_XHCI/' config/usb.h
        sed -i 's/#undef\tUSB_KEYBOARD/#define USB_KEYBOARD/' config/usb.h
        sed -i 's/#undef\tUSB_BLOCK/#define USB_BLOCK/' config/usb.h
        sed -i 's/#undef\tUSB_EFI/#define USB_EFI/' config/usb.h
        cp ../../chain.ipxe chain.ipxe
        
        # Дописываем абсолютно все тяжелые команды отладки, включая PCI_CMD
        cat <<EOF > config/local/general.h
        #define DOWNLOAD_PROTO_NFS
        #define IMAGE_PNG
        #define IMAGE_SCRIPT
        #define IMAGE_EFI
        #define CONSOLE_CMD
        #define CONFIG_CMD
        #define MENU_CMD
        #define SHELL_CMD
        #define PING_CMD
        #define PCI_CMD
        #define PARAM_CMD
        #define REBOOT_CMD
        #define POWEROFF_CMD
        EOF
        
        make bin-x86_64-efi/ipxe.efi EMBED=chain.ipxe
        make bin-x86_64-efi/ipxe.usb EMBED=chain.ipxe

    - name: Upload UEFI Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ipxe-uefi-binaries
        path: |
          ipxe/src/bin-x86_64-efi/ipxe.efi
          ipxe/src/bin-x86_64-efi/ipxe.usb
